document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

60;line-height:1.7;margin:0\">Artículos sobre bienestar, ciencia, rutinas y avances que elevan tu día a día.<\u002Fp>\n            <div><button onclick=\"{{ goJournal }}\" style=\"background:#37432f;color:#efece4;border:none;padding:14px 26px;cursor:pointer;font-size:12px;letter-spacing:.16em;text-transform:uppercase;width:fit-content\">Ir al Journal<\u002Fbutton><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:2 1 420px;display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:20px\">\n            <sc-for list=\"{{ journal3 }}\" as=\"item\" hint-placeholder-count=\"3\">\n              <button onclick=\"{{ goArticle }}\" style=\"text-align:left;background:none;border:none;cursor:pointer;padding:0;display:flex;flex-direction:column;gap:10px\">\n                <div style=\"height:130px;background:repeating-linear-gradient(135deg,#ddd8cb 0 13px,#d4cebf 13px 26px)\"><\u002Fdiv>\n                <div style=\"font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#8a7a4e\">{{ item.cat }}<\u002Fdiv>\n                <div style=\"font-family:'Cormorant Garamond',serif;font-size:19px;color:#2a2924;line-height:1.2\">{{ item.title }}<\u002Fdiv>\n                <span style=\"font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#8a6d2e\">Leer más →<\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ================= COLECCIONES HUB ================= -->\n    <sc-if value=\"{{ isColecciones }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"animation:mcFade .3s ease\">\n      <section style=\"max-width:900px;margin:0 auto;padding:clamp(40px,6vw,74px) clamp(18px,4vw,48px);text-align:center\">\n        <div style=\"font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:#8a7a4e;margin-bottom:14px\">Colecciones<\u002Fdiv>\n        <h1 style=\"font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(30px,4.5vw,50px);line-height:1.08;color:#2a2924;margin:0 0 16px\">Fórmulas para cada forma de vivir mejor.<\u002Fh1>\n        <p style=\"font-weight:300;font-size:17px;color:#6c6a60;margin:0;max-width:520px;margin-left:auto;margin-right:auto\">Dos universos de bienestar diseñados con ciencia y propósito: para ti y para quienes forman parte de tu familia.<\u002Fp>\n      <\u002Fsection>\n      <section style=\"max-width:1280px;margin:0 auto;padding:0 clamp(18px,4vw,48px) clamp(50px,7vw,90px);display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:26px\">\n        <button onclick=\"{{ goHumanos }}\" style=\"text-align:left;background:#f5f3ec;border:1px solid rgba(0,0,0,.08);cursor:pointer;padding:0;display:flex;flex-direction:column\">\n          <div style=\"height:340px;background:repeating-linear-gradient(135deg,#dcd7ca 0 15px,#d3cdbe 15px 30px);color:#8f886f;font-family:ui-monospace,Menlo,monospace;font-size:11px;display:flex;align-items:flex-end;padding:16px\">[ humanos ]<\u002Fdiv>\n          <div style=\"padding:26px 28px 30px\"><div style=\"font-family:'Cormorant Garamond',serif;font-size:30px;color:#2a2924;margin-bottom:8px\">Humanos<\u002Fdiv><p style=\"font-weight:300;color:#6c6a60;margin:0 0 14px;line-height:1.6\">AURA, NOCTURNE, INVICTUS y ZENITH. Descanso, claridad, recuperación y enfoque.<\u002Fp><span style=\"font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:#8a6d2e\">Explorar colección →<\u002Fspan><\u002Fdiv>\n        <\u002Fbutton>\n        <button onclick=\"{{ goAnimalia }}\" style=\"text-align:left;background:#f5f3ec;border:1px solid rgba(0,0,0,.08);cursor:pointer;padding:0;display:flex;flex-direction:column\">\n          <div style=\"height:340px;background:repeating-linear-gradient(135deg,#dcd7ca 0 15px,#d3cdbe 15px 30px);color:#8f886f;font-family:ui-monospace,Menlo,monospace;font-size:11px;display:flex;align-items:flex-end;padding:16px\">[ animalia ]<\u002Fdiv>\n          <div style=\"padding:26px 28px 30px\"><div style=\"font-family:'Cormorant Garamond',serif;font-size:30px;color:#2a2924;margin-bottom:8px\">Animalia<\u002Fdiv><p style=\"font-weight:300;color:#6c6a60;margin:0 0 14px;line-height:1.6\">CALM y MOTION. Cuidado pensado para quienes nunca caminan solos.<\u002Fp><span style=\"font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:#8a6d2e\">Explorar colección →<\u002Fspan><\u002Fdiv>\n        <\u002Fbutton>\n      <\u002Fsection>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ================= HUMANOS ================= -->\n    <sc-if value=\"{{ isHumanos }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"animation:mcFade .3s ease\">\n      <section style=\"max-width:900px;margin:0 auto;padding:clamp(30px,4vw,50px) clamp(18px,4vw,48px) 10px;text-align:center\">\n        <div style=\"font-size:12px;letter-spacing:.08em;color:#8a8677;margin-bottom:20px;text-align:left\"><button onclick=\"{{ goColecciones }}\" style=\"background:none;border:none;cursor:pointer;color:#8a8677;font-size:12px;padding:0\">Colecciones<\u002Fbutton> › Humanos<\u002Fdiv>\n        <div style=\"font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:#8a7a4e;margin-bottom:12px\">Colección Humanos<\u002Fdiv>\n        <h1 style=\"font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(28px,4vw,44px);line-height:1.1;color:#2a2924;margin:0 0 14px\">El bienestar adopta distintas formas. La intención de vivir mejor permanece.<\u002Fh1>\n        <div style=\"font-weight:300;color:#6c6a60;margin:0\"><div>Una colección concebida para integrarse con naturalidad a distintos momentos, necesidades y formas de vivir.<\u002Fdiv><\u002Fdiv>\n      <\u002Fsection>\n      <section style=\"max-width:1120px;margin:0 auto;padding:clamp(24px,4vw,40px) clamp(18px,4vw,48px);display:flex;flex-direction:column;gap:22px\">\n        <sc-for list=\"{{ humanos }}\" as=\"item\" hint-placeholder-count=\"4\">\n          <div style=\"background:#f5f3ec;border:1px solid rgba(0,0,0,.07);display:flex;flex-wrap:wrap\">\n            <div style=\"flex:1 1 300px;min-height:260px;background:repeating-linear-gradient(135deg,#dcd7ca 0 14px,#d3cdbe 14px 28px);color:#8f886f;font-family:ui-monospace,Menlo,monospace;font-size:11px;display:flex;align-items:flex-end;padding:14px\">[ {{ item.name }} ]<\u002Fdiv>\n            <div style=\"flex:1 1 320px;padding:clamp(24px,3vw,40px);display:flex;flex-direction:column;gap:16px;justify-content:center\">\n              <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:500;font-size:30px;letter-spacing:.04em;color:#2a2924;margin:0\">{{ item.name }}<\u002Fh2>\n              <p style=\"font-weight:300;color:#5a5850;line-height:1.6;margin:0;max-width:420px\">{{ item.desc }}<\u002Fp>\n              <div style=\"display:flex;flex-wrap:wrap;gap:8px\">\n                <sc-for list=\"{{ item.tags }}\" as=\"tag\" hint-placeholder-count=\"4\">\n                  <span style=\"font-size:11px;letter-spacing:.04em;color:#5a5850;border:1px solid rgba(0,0,0,.14);padding:6px 11px\">{{ tag }}<\u002Fspan>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div><button onclick=\"{{ item.open }}\" style=\"background:#37432f;color:#efece4;border:none;padding:13px 26px;font-size:12px;letter-spacing:.16em;text-transform:uppercase;cursor:pointer\">Explorar {{ item.name }}<\u002Fbutton><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fsection>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ================= ANIMALIA ================= -->\n    <sc-if value=\"{{ isAnimalia }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"animation:mcFade .3s ease\">\n      <section style=\"max-width:900px;margin:0 auto;padding:clamp(30px,4vw,50px) clamp(18px,4vw,48px) 10px;text-align:center\">\n        <div style=\"font-size:12px;letter-spacing:.08em;color:#8a8677;margin-bottom:20px;text-align:left\"><button onclick=\"{{ goColecciones }}\" style=\"background:none;border:none;cursor:pointer;color:#8a8677;font-size:12px;padding:0\">Colecciones<\u002Fbutton> › Animalia<\u002Fdiv>\n        <div style=\"font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:#8a7a4e;margin-bottom:12px\">Colección Animalia<\u002Fdiv>\n        <h1 style=\"font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(30px,4.5vw,48px);line-height:1.1;color:#2a2924;margin:0 0 14px\">Para quienes nunca caminan solos.<\u002Fh1>\n        <p style=\"font-weight:300;color:#6c6a60;margin:0\">Inspirada en el vínculo que compartimos con quienes forman parte de nuestra familia.<\u002Fp>\n      <\u002Fsection>\n      <section style=\"max-width:1120px;margin:0 auto;padding:clamp(24px,4vw,40px) clamp(18px,4vw,48px);display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:24px\">\n        <sc-for list=\"{{ animalia }}\" as=\"item\" hint-placeholder-count=\"2\">\n          <div style=\"background:#f5f3ec;border:1px solid rgba(0,0,0,.07);display:flex;flex-direction:column\">\n            <div style=\"height:240px;background:repeating-linear-gradient(135deg,#dcd7ca 0 14px,#d3cdbe 14px 28px);color:#8f886f;font-family:ui-monospace,Menlo,monospace;font-size:11px;display:flex;align-items:flex-end;padding:14px\">[ {{ item.name }} ]<\u002Fdiv>\n            <div style=\"padding:clamp(22px,3vw,34px);display:flex;flex-direction:column;gap:16px\">\n              <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:500;font-size:26px;letter-spacing:.03em;color:#2a2924;margin:0\">{{ item.name }}<\u002Fh2>\n              <p style=\"font-weight:300;color:#5a5850;line-height:1.6;margin:0\">{{ item.desc }}<\u002Fp>\n              <div style=\"display:flex;flex-wrap:wrap;gap:8px\">\n                <sc-for list=\"{{ item.tags }}\" as=\"tag\" hint-placeholder-count=\"4\">\n                  <span style=\"font-size:11px;color:#5a5850;border:1px solid rgba(0,0,0,.14);padding:6px 10px\">{{ tag }}<\u002Fspan>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div><div style=\"font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#8a7a4e;margin-bottom:8px\">Especies<\u002Fdiv><div style=\"display:flex;flex-wrap:wrap;gap:6px\"><sc-for list=\"{{ item.species }}\" as=\"sp\" hint-placeholder-count=\"4\"><span style=\"font-size:12px;color:#5a5850;background:#e7e3d9;padding:5px 10px\">{{ sp }}<\u002Fspan><\u002Fsc-for><\u002Fdiv><\u002Fdiv>\n              <div><div style=\"font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#8a7a4e;margin-bottom:8px\">Disponible en<\u002Fdiv><div style=\"display:flex;gap:10px\"><sc-for list=\"{{ item.mg }}\" as=\"d\" hint-placeholder-count=\"2\"><span style=\"font-size:13px;color:#33322b;border:1px solid rgba(0,0,0,.2);padding:8px 16px\">{{ d }}<\u002Fspan><\u002Fsc-for><\u002Fdiv><\u002Fdiv>\n              <div style=\"margin-top:4px\"><button onclick=\"{{ item.open }}\" style=\"display:block;width:100%;text-align:center;background:#37432f;color:#efece4;border:none;padding:14px;font-size:12px;letter-spacing:.16em;text-transform:uppercase;cursor:pointer\">Ver detalles<\u002Fbutton><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fsection>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ================= FILOSOFIA ================= -->\n    <sc-if value=\"{{ isFilosofia }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"animation:mcFade .3s ease\">\n      <section style=\"min-height:360px;background:repeating-linear-gradient(135deg,#20250f 0 16px,#272d15 16px 32px);display:flex;align-items:flex-end\"><div style=\"max-width:1280px;margin:0 auto;width:100%;padding:clamp(36px,6vw,72px) clamp(18px,4vw,48px)\"><div style=\"font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:#c6a24e;margin-bottom:12px\">Filosofía med&amp;canna<\u002Fdiv><h1 style=\"font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(32px,5vw,56px);line-height:1.05;color:#efe9dc;margin:0;max-width:640px\">Una decisión diaria.<\u002Fh1><p style=\"font-weight:300;color:#cfcbbb;margin:14px 0 0;max-width:440px;line-height:1.6\">La excelencia personal merece herramientas a su altura.<\u002Fp><\u002Fdiv><\u002Fsection>\n      <section style=\"background:#37432f\"><div style=\"max-width:1080px;margin:0 auto;padding:clamp(40px,5vw,64px) clamp(18px,4vw,48px);display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:34px\">\n        <p style=\"font-weight:300;color:#dedbc9;line-height:1.7;margin:0;text-align:center\">med&amp;canna nace para quienes buscan rendir mejor, pensar con mayor claridad y vivir con mayor equilibrio.<\u002Fp>\n        <p style=\"font-weight:300;color:#dedbc9;line-height:1.7;margin:0;text-align:center\">Creemos que el bienestar no consiste en escapar de la realidad, sino en desarrollar la capacidad de afrontarla con plenitud.<\u002Fp>\n        <p style=\"font-weight:300;color:#dedbc9;line-height:1.7;margin:0;text-align:center\">Porque una vida extraordinaria se construye a partir de pequeñas decisiones diarias.<\u002Fp>\n      <\u002Fdiv><\u002Fsection>\n      <section style=\"max-width:1120px;margin:0 auto;padding:clamp(46px,6vw,74px) clamp(18px,4vw,48px);display:flex;flex-wrap:wrap;gap:40px;align-items:center\">\n        <div style=\"flex:1 1 300px;display:flex;flex-direction:column;gap:16px\"><div style=\"font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#8a7a4e\">Más que productos,<\u002Fdiv><h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(26px,3.5vw,40px);line-height:1.12;color:#2a2924;margin:0\">No creemos en desconectarse del mundo.<\u002Fh2><p style=\"font-weight:300;color:#5a5850;line-height:1.7;margin:0\">Creemos en enfrentarlo con claridad, equilibrio y propósito. Creamos productos para personas que entienden que el descanso, la concentración, la recuperación y el autocuidado no son recompensas ocasionales, sino elementos esenciales de una vida bien vivida.<\u002Fp><\u002Fdiv>\n        <div style=\"flex:1 1 300px;min-height:300px;background:repeating-linear-gradient(135deg,#ddd8cb 0 15px,#d4cebf 15px 30px);color:#8f886f;font-family:ui-monospace,Menlo,monospace;font-size:11px;display:flex;align-items:flex-end;padding:16px\">[ vínculo · naturaleza ]<\u002Fdiv>\n      <\u002Fsection>\n      <section style=\"background:#f5f3ec\"><div style=\"max-width:1200px;margin:0 auto;padding:clamp(40px,5vw,64px) clamp(18px,4vw,48px)\"><div style=\"text-align:center;font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:#8a7a4e;margin-bottom:30px\">Nuestros principios<\u002Fdiv><div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:26px\">\n        <div style=\"text-align:center\"><div style=\"font-family:'Cormorant Garamond',serif;font-size:19px;color:#2a2924;margin-bottom:6px\">Bienestar consciente<\u002Fdiv><p style=\"font-size:12px;font-weight:300;color:#6c6a60;line-height:1.6;margin:0\">Hábitos que contribuyen al equilibrio y la calidad de vida.<\u002Fp><\u002Fdiv>\n        <div style=\"text-align:center\"><div style=\"font-family:'Cormorant Garamond',serif;font-size:19px;color:#2a2924;margin-bottom:6px\">Calidad sin compromisos<\u002Fdiv><p style=\"font-size:12px;font-weight:300;color:#6c6a60;line-height:1.6;margin:0\">Cada detalle importa, de la formulación a la experiencia final.<\u002Fp><\u002Fdiv>\n        <div style=\"text-align:center\"><div style=\"font-family:'Cormorant Garamond',serif;font-size:19px;color:#2a2924;margin-bottom:6px\">Transparencia<\u002Fdiv><p style=\"font-size:12px;font-weight:300;color:#6c6a60;line-height:1.6;margin:0\">La confianza se construye a través de la claridad y la evidencia.<\u002Fp><\u002Fdiv>\n        <div style=\"text-align:center\"><div style=\"font-family:'Cormorant Garamond',serif;font-size:19px;color:#2a2924;margin-bottom:6px\">Equilibrio<\u002Fdiv><p style=\"font-size:12px;font-weight:300;color:#6c6a60;line-height:1.6;margin:0\">Una vida donde el rendimiento y el bienestar pueden coexistir.<\u002Fp><\u002Fdiv>\n        <div style=\"text-align:center\"><div style=\"font-family:'Cormorant Garamond',serif;font-size:19px;color:#2a2924;margin-bottom:6px\">Innovación responsable<\u002Fdiv><p style=\"font-size:12px;font-weight:300;color:#6c6a60;line-height:1.6;margin:0\">Nuevas posibilidades guiadas por ciencia, ética y seguridad.<\u002Fp><\u002Fdiv>\n        <div style=\"text-align:center\"><div style=\"font-family:'Cormorant Garamond',serif;font-size:19px;color:#2a2924;margin-bottom:6px\">Excelencia personal<\u002Fdiv><p style=\"font-size:12px;font-weight:300;color:#6c6a60;line-height:1.6;margin:0\">Acompañamos a quienes buscan una mejor versión de sí mismos.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv><\u002Fdiv><\u002Fsection>\n      <section style=\"background:repeating-linear-gradient(135deg,#20250f 0 16px,#272d15 16px 32px);text-align:center;padding:clamp(50px,7vw,84px) clamp(18px,4vw,48px)\"><p style=\"font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:400;font-size:clamp(22px,3.2vw,34px);color:#efe9dc;margin:0;max-width:760px;margin-left:auto;margin-right:auto;line-height:1.3\">“El bienestar no es un destino, es una forma consciente de vivir cada día.”<\u002Fp><\u002Fsection>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ================= CALIDAD ================= -->\n    <sc-if value=\"{{ isCalidad }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"animation:mcFade .3s ease\">\n      <section style=\"background:#20250f;display:flex;flex-wrap:wrap\"><div style=\"flex:1 1 320px;padding:clamp(40px,5vw,72px) clamp(18px,4vw,48px);display:flex;flex-direction:column;justify-content:center;gap:18px\"><h1 style=\"font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(34px,5vw,56px);line-height:1.02;color:#efe9dc;margin:0\">Lo que<br>nos define<\u002Fh1><p style=\"font-weight:300;color:#cfcbbb;line-height:1.7;margin:0;max-width:420px\">Cada decisión detrás de Medycanna responde al mismo estándar: calidad, transparencia y responsabilidad. Ese compromiso nace de un principio que guía todo lo que hacemos:<\u002Fp><p style=\"font-family:'Cormorant Garamond',serif;font-style:italic;font-size:22px;color:#c6a24e;margin:0\">hacer las cosas correctamente, incluso cuando nadie está mirando.<\u002Fp><\u002Fdiv><div style=\"flex:1 1 320px;min-height:300px;background:repeating-linear-gradient(135deg,#12160d 0 16px,#191e12 16px 32px);color:#6d7a52;font-family:ui-monospace,Menlo,monospace;font-size:11px;display:flex;align-items:flex-end;padding:16px\">[ espacio · interiores ]<\u002Fdiv><\u002Fsection>\n      <section style=\"max-width:1120px;margin:0 auto;padding:clamp(46px,6vw,74px) clamp(18px,4vw,48px);display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:34px\">\n        <div style=\"text-align:center\"><h3 style=\"font-family:'Cormorant Garamond',serif;font-weight:500;font-size:24px;color:#2a2924;margin:0 0 12px\">Calidad desde el origen<\u002Fh3><p style=\"font-weight:300;color:#6c6a60;line-height:1.7;margin:0\">Seleccionamos cuidadosamente cada materia prima. La excelencia comienza antes de la formulación.<\u002Fp><\u002Fdiv>\n        <div style=\"text-align:center\"><h3 style=\"font-family:'Cormorant Garamond',serif;font-weight:500;font-size:24px;color:#2a2924;margin:0 0 12px\">Transparencia como principio<\u002Fh3><p style=\"font-weight:300;color:#6c6a60;line-height:1.7;margin:0\">Compartimos aquello que conocemos y verificamos. Creemos en relaciones basadas en la confianza.<\u002Fp><\u002Fdiv>\n        <div style=\"text-align:center\"><h3 style=\"font-family:'Cormorant Garamond',serif;font-weight:500;font-size:24px;color:#2a2924;margin:0 0 12px\">Formulado con intención<\u002Fh3><p style=\"font-weight:300;color:#6c6a60;line-height:1.7;margin:0\">Cada colección fue desarrollada para una experiencia específica. Porque cada detalle tiene una razón de existir.<\u002Fp><\u002Fdiv>\n      <\u002Fsection>\n      <section style=\"background:#37432f;display:flex;flex-wrap:wrap\"><div style=\"flex:1 1 300px;min-height:280px;background:repeating-linear-gradient(135deg,#2c3623 0 15px,#33402a 15px 30px);color:#95a678;font-family:ui-monospace,Menlo,monospace;font-size:11px;display:flex;align-items:flex-end;padding:16px\">[ momento · ritual ]<\u002Fdiv><div style=\"flex:1 1 320px;padding:clamp(40px,5vw,64px);display:flex;flex-direction:column;justify-content:center;gap:14px\"><h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(26px,3.5vw,40px);color:#efe9dc;margin:0\">Más allá de la formulación<\u002Fh2><div style=\"font-weight:300;color:#dedbc9;line-height:1.7;margin:0;max-width:440px\"><div>Las diferencias más importantes no siempre aparecen en una etiqueta. También se encuentran en los principios que las respaldan, el cuidado con el que se desarrollan y el compromiso de hacer las cosas correctamente desde el origen.<\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fsection>\n      <section style=\"max-width:1120px;margin:0 auto;padding:clamp(46px,6vw,74px) clamp(18px,4vw,48px);display:flex;flex-wrap:wrap;gap:36px 80px;align-items:center\"><div style=\"flex:1 1 240px\"><h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(24px,3vw,34px);line-height:1.1;color:#2a2924;margin:0 0 12px\">Cada decisión cuenta.<\u002Fh2><p style=\"font-weight:300;color:#6c6a60;line-height:1.7;margin:0\">Desde el origen de cada ingrediente hasta la experiencia de quien confía en Medycanna, creemos que son las decisiones constantes las que construyen algo extraordinario.<\u002Fp><\u002Fdiv><div style=\"flex:2 1 380px;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:28px 24px\"><div><div style=\"font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#8a7a4e;margin-bottom:8px\">Calidad<\u002Fdiv><p style=\"font-size:13px;font-weight:300;color:#6c6a60;line-height:1.6;margin:0\">Elegida con intención.<\u002Fp><\u002Fdiv><div><div style=\"font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#8a7a4e;margin-bottom:8px\">Transparencia<\u002Fdiv><p style=\"font-size:13px;font-weight:300;color:#6c6a60;line-height:1.6;margin:0\">Respaldada por principios.<\u002Fp><\u002Fdiv><div><div style=\"font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#8a7a4e;margin-bottom:8px\">Evolución<\u002Fdiv><p style=\"font-size:13px;font-weight:300;color:#6c6a60;line-height:1.6;margin:0\">Impulsada por la mejora continua.<\u002Fp><\u002Fdiv><div><div style=\"font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#8a7a4e;margin-bottom:8px\">Legado<\u002Fdiv><p style=\"font-size:13px;font-weight:300;color:#6c6a60;line-height:1.6;margin:0\">Lo que hacemos hoy define nuestra esencia.<\u002Fp><\u002Fdiv><\u002Fdiv><\u002Fsection>\n      <section style=\"background:repeating-linear-gradient(135deg,#20250f 0 16px,#272d15 16px 32px);text-align:center;padding:clamp(50px,7vw,84px) clamp(18px,4vw,48px)\"><p style=\"font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(22px,3.2vw,34px);color:#efe9dc;margin:0;max-width:760px;margin-left:auto;margin-right:auto;line-height:1.3\">“Pequeñas decisiones diarias, extraordinarios resultados a largo plazo.”<\u002Fp><\u002Fsection>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ================= JOURNAL ================= -->\n    <sc-if value=\"{{ isJournal }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"animation:mcFade .3s ease\">\n      <section style=\"max-width:1000px;margin:0 auto;padding:clamp(40px,6vw,74px) clamp(18px,4vw,48px) clamp(20px,3vw,30px);text-align:center\"><div style=\"font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:#8a7a4e;margin-bottom:14px\">Journal<\u002Fdiv><h1 style=\"font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(30px,4.5vw,50px);line-height:1.08;color:#2a2924;margin:0 0 16px\">Contenido que informa, inspira y transforma.<\u002Fh1><p style=\"font-weight:300;color:#6c6a60;margin:0 0 20px\">Bienestar, ciencia y estilo de vida. <span style=\"color:#9a9384\">· Blog integrado vía Shopify<\u002Fspan><\u002Fp><div style=\"display:flex;flex-wrap:wrap;gap:10px;justify-content:center\"><span style=\"font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:#37432f;border-bottom:1.5px solid #37432f;padding:6px 4px\">Todos<\u002Fspan><span style=\"font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:#8a8677;padding:6px 4px\">Bienestar<\u002Fspan><span style=\"font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:#8a8677;padding:6px 4px\">Ciencia<\u002Fspan><span style=\"font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:#8a8677;padding:6px 4px\">Estilo de vida<\u002Fspan><\u002Fdiv><\u002Fsection>\n      <section style=\"max-width:1120px;margin:0 auto;padding:clamp(20px,3vw,30px) clamp(18px,4vw,48px) clamp(50px,7vw,84px);display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:26px\">\n        <sc-for list=\"{{ journal }}\" as=\"item\" hint-placeholder-count=\"4\">\n          <button onclick=\"{{ goArticle }}\" style=\"text-align:left;background:none;border:none;cursor:pointer;padding:0;display:flex;flex-direction:column;gap:12px\">\n            <div style=\"height:190px;background:repeating-linear-gradient(135deg,#ddd8cb 0 14px,#d4cebf 14px 28px)\"><\u002Fdiv>\n            <div style=\"font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#8a7a4e\">{{ item.cat }} · {{ item.read }}<\u002Fdiv>\n            <div style=\"font-family:'Cormorant Garamond',serif;font-size:23px;color:#2a2924;line-height:1.15\">{{ item.title }}<\u002Fdiv>\n            <p style=\"font-weight:300;color:#6c6a60;line-height:1.6;margin:0;font-size:14px\">{{ item.excerpt }}<\u002Fp>\n            <span style=\"font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#8a6d2e\">Leer más →<\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fsection>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ================= ARTICLE ================= -->\n    <sc-if value=\"{{ isArticle }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"animation:mcFade .3s ease\">\n      <article style=\"max-width:760px;margin:0 auto;padding:clamp(30px,4vw,54px) clamp(18px,4vw,40px)\">\n        <button onclick=\"{{ goJournal }}\" style=\"background:none;border:none;cursor:pointer;color:#8a6d2e;font-size:12px;letter-spacing:.12em;text-transform:uppercase;padding:0;margin-bottom:24px\">← Journal<\u002Fbutton>\n        <div style=\"font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#8a7a4e;margin-bottom:12px\">Bienestar · 5 min de lectura<\u002Fdiv>\n        <h1 style=\"font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(30px,4.5vw,48px);line-height:1.1;color:#2a2924;margin:0 0 16px\">Rutinas para un bienestar integral<\u002Fh1>\n        <div style=\"font-size:13px;font-weight:300;color:#9a9384;border-bottom:1px solid rgba(0,0,0,.12);padding-bottom:20px;margin-bottom:26px\">Por Editorial med&amp;canna · 12 de junio, 2024<\u002Fdiv>\n        <div style=\"height:320px;background:repeating-linear-gradient(135deg,#ddd8cb 0 15px,#d4cebf 15px 30px);color:#8f886f;font-family:ui-monospace,Menlo,monospace;font-size:11px;display:flex;align-items:flex-end;padding:16px;margin-bottom:30px\">[ imagen destacada del artículo ]<\u002Fdiv>\n        <p style=\"font-weight:300;font-size:17px;color:#3f3d36;line-height:1.8;margin:0 0 20px\">El bienestar no se construye en un solo gesto, sino en la suma de pequeñas decisiones repetidas con constancia. Este es un artículo de ejemplo con contenido de marcador de posición para validar la plantilla de detalle del Journal.<\u002Fp>\n        <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:500;font-size:28px;color:#2a2924;margin:32px 0 14px\">Empezar por lo esencial<\u002Fh2>\n        <p style=\"font-weight:300;font-size:17px;color:#3f3d36;line-height:1.8;margin:0 0 20px\">Placeholder de párrafo. Aquí iría el desarrollo del contenido editorial: descanso, enfoque, recuperación y calma como pilares de una rutina sostenible.<\u002Fp>\n        <blockquote style=\"font-family:'Cormorant Garamond',serif;font-style:italic;font-size:24px;color:#37432f;border-left:2px solid #c6a24e;padding-left:22px;margin:30px 0\">“Pequeños rituales, grandes cambios.”<\u002Fblockquote>\n        <p style=\"font-weight:300;font-size:17px;color:#3f3d36;line-height:1.8;margin:0 0 30px\">Placeholder de cierre del artículo con una llamada a la acción hacia las colecciones o los protocolos.<\u002Fp>\n        <div style=\"border-top:1px solid rgba(0,0,0,.12);padding-top:24px\"><div style=\"font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#8a7a4e;margin-bottom:16px\">Sigue leyendo<\u002Fdiv><div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:18px\"><button onclick=\"{{ goArticle }}\" style=\"text-align:left;background:none;border:none;cursor:pointer;padding:0\"><div style=\"height:110px;background:repeating-linear-gradient(135deg,#ddd8cb 0 13px,#d4cebf 13px 26px);margin-bottom:8px\"><\u002Fdiv><div style=\"font-family:'Cormorant Garamond',serif;font-size:17px;color:#2a2924\">Entendiendo los fitocannabinoides<\u002Fdiv><\u002Fbutton><button onclick=\"{{ goArticle }}\" style=\"text-align:left;background:none;border:none;cursor:pointer;padding:0\"><div style=\"height:110px;background:repeating-linear-gradient(135deg,#ddd8cb 0 13px,#d4cebf 13px 26px);margin-bottom:8px\"><\u002Fdiv><div style=\"font-family:'Cormorant Garamond',serif;font-size:17px;color:#2a2924\">El descanso como inversión<\u002Fdiv><\u002Fbutton><\u002Fdiv><\u002Fdiv>\n      <\u002Farticle>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ================= FAQ ================= -->\n    <sc-if value=\"{{ isFAQ }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"animation:mcFade .3s ease\">\n      <section style=\"max-width:820px;margin:0 auto;padding:clamp(40px,6vw,74px) clamp(18px,4vw,48px) clamp(20px,3vw,30px);text-align:center\"><div style=\"font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:#8a7a4e;margin-bottom:14px\">Ayuda<\u002Fdiv><h1 style=\"font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(30px,4.5vw,48px);color:#2a2924;margin:0 0 12px\">Preguntas frecuentes<\u002Fh1><p style=\"font-weight:300;color:#6c6a60;margin:0\">Resolvemos las dudas más comunes sobre nuestros productos y la experiencia med&amp;canna.<\u002Fp><\u002Fsection>\n      <section style=\"max-width:820px;margin:0 auto;padding:0 clamp(18px,4vw,48px) clamp(30px,4vw,40px)\">\n        <sc-for list=\"{{ faqGroups }}\" as=\"group\" hint-placeholder-count=\"5\">\n          <div style=\"margin-bottom:clamp(30px,4vw,44px)\">\n            <div style=\"font-family:'Jost',sans-serif;font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:#8a7a4e;margin-bottom:6px\">{{ group.cat }}<\u002Fdiv>\n            <div style=\"border-top:1px solid rgba(0,0,0,.12)\">\n              <sc-for list=\"{{ group.items }}\" as=\"item\" hint-placeholder-count=\"4\">\n                <div style=\"border-bottom:1px solid rgba(0,0,0,.12)\"><button onclick=\"{{ item.toggle }}\" style=\"width:100%;text-align:left;background:none;border:none;cursor:pointer;padding:20px 4px;display:flex;justify-content:space-between;align-items:center;gap:16px;font-family:'Jost',sans-serif;font-size:16px;color:#33322b\">{{ item.q }}<span style=\"font-size:22px;color:#8a6d2e;font-weight:300;flex:none\">{{ item.sign }}<\u002Fspan><\u002Fbutton><sc-if value=\"{{ item.open }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"padding:0 4px 22px;margin:0;font-weight:300;color:#6c6a60;line-height:1.7\">{{ item.a }}<\u002Fp><\u002Fsc-if><\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fsection>\n      <section style=\"max-width:820px;margin:0 auto;padding:0 clamp(18px,4vw,48px) clamp(50px,7vw,84px);text-align:center\"><p style=\"font-weight:300;color:#6c6a60;margin:0 0 16px\">¿No encontraste lo que buscabas?<\u002Fp><button onclick=\"{{ goContacto }}\" style=\"background:#37432f;color:#efece4;border:none;padding:14px 30px;cursor:pointer;font-size:12px;letter-spacing:.16em;text-transform:uppercase\">Contáctanos<\u002Fbutton><\u002Fsection>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ================= CONTACTO ================= -->\n    <sc-if value=\"{{ isContacto }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"animation:mcFade .3s ease\">\n      <section style=\"max-width:1080px;margin:0 auto;padding:clamp(40px,6vw,74px) clamp(18px,4vw,48px);display:flex;flex-wrap:wrap;gap:48px\">\n        <div style=\"flex:1 1 260px;display:flex;flex-direction:column;gap:16px\"><div style=\"font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:#8a7a4e\">Ayuda<\u002Fdiv><h1 style=\"font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(30px,4vw,44px);line-height:1.1;color:#2a2924;margin:0\">Hablemos.<\u002Fh1><p style=\"font-weight:300;color:#6c6a60;line-height:1.7;margin:0\">Estamos para acompañarte. Escríbenos y nuestro equipo responderá a la brevedad.<\u002Fp><div style=\"margin-top:8px;display:flex;flex-direction:column;gap:12px\"><div><div style=\"font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#8a7a4e;margin-bottom:4px\">Correo<\u002Fdiv><div style=\"font-weight:300;color:#33322b\">hola@medcanna.com<\u002Fdiv><\u002Fdiv><div><div style=\"font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#8a7a4e;margin-bottom:4px\">Teléfono<\u002Fdiv><div style=\"font-weight:300;color:#33322b\">+52 55 1234 5678<\u002Fdiv><\u002Fdiv><div><div style=\"font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#8a7a4e;margin-bottom:4px\">Horario<\u002Fdiv><div style=\"font-weight:300;color:#33322b\">Lun–Vie · 9:00–18:00 h<\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div style=\"flex:1 1 320px;display:flex;flex-direction:column;gap:14px\"><div style=\"display:flex;gap:14px;flex-wrap:wrap\"><input placeholder=\"Nombre\" style=\"flex:1 1 140px;border:1px solid rgba(0,0,0,.2);background:#fff;padding:13px 14px;font-size:14px;color:#33322b\"><input placeholder=\"Correo electrónico\" style=\"flex:1 1 140px;border:1px solid rgba(0,0,0,.2);background:#fff;padding:13px 14px;font-size:14px;color:#33322b\"><\u002Fdiv><input placeholder=\"Asunto\" style=\"border:1px solid rgba(0,0,0,.2);background:#fff;padding:13px 14px;font-size:14px;color:#33322b\"><textarea placeholder=\"Mensaje\" rows=\"5\" style=\"border:1px solid rgba(0,0,0,.2);background:#fff;padding:13px 14px;font-size:14px;color:#33322b;resize:vertical\"><\u002Ftextarea><button style=\"background:#37432f;color:#efece4;border:none;padding:15px;cursor:pointer;font-size:12px;letter-spacing:.16em;text-transform:uppercase\">Enviar mensaje<\u002Fbutton><\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ================= SIMPLE PROSE (envios / legal) ================= -->\n    <sc-if value=\"{{ isSimple }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"animation:mcFade .3s ease\">\n      <section style=\"max-width:760px;margin:0 auto;padding:clamp(40px,6vw,74px) clamp(18px,4vw,40px)\">\n        <div style=\"font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:#8a7a4e;margin-bottom:12px\">{{ simple.kicker }}<\u002Fdiv>\n        <h1 style=\"font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(30px,4.5vw,48px);color:#2a2924;margin:0 0 16px\">{{ simple.title }}<\u002Fh1>\n        <p style=\"font-weight:300;font-size:17px;color:#4a4840;line-height:1.7;margin:0 0 8px;border-bottom:1px solid rgba(0,0,0,.12);padding-bottom:28px\">{{ simple.intro }}<\u002Fp>\n        <sc-for list=\"{{ simple.blocks }}\" as=\"b\" hint-placeholder-count=\"4\">\n          <div style= )\"><\u002Fspan>Si ya eres cliente<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <a href=\"mailto:concierge@medycanna.com?subject=Solicitud%20de%20acceso%20a%20la%20Cava%20med%26canna&amp;body=Hola%20equipo%20Cava%2C%0D%0A%0D%0AMe%20gustar%C3%ADa%20solicitar%20acceso%20a%20la%20Cava.%20Estos%20son%20mis%20datos%3A%0D%0A%0D%0ANombre%3A%0D%0ACorreo%3A%0D%0A%C2%BFC%C3%B3mo%20conoc%C3%AD%20med%26canna%3F%3A%0D%0A%C2%BFSoy%20cliente%20actual%3F%20(S%C3%AD%2FNo)%3A%0D%0A%0D%0AGracias.\" onclick=\"{{ cavaConfirmView }}\" style=\"text-decoration:none;text-align:center;background:linear-gradient(90deg,#c6a24e,#e2c680);color:#20180a;padding:15px;font-size:12px;letter-spacing:.18em;text-transform:uppercase;margin-top:4px;display:inline-flex;align-items:center;justify-content:center;gap:10px\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\"><rect x=\"3\" y=\"5\" width=\"18\" height=\"14\" rx=\"1\"><\u002Frect><path d=\"M3 6l9 6 9-6\"><\u002Fpath><\u002Fsvg>Escribir al concierge<\u002Fa>\n          <div style=\"text-align:center;font-size:13px;color:#9a9280\">o escríbenos a <a href=\"mailto:concierge@medycanna.com\" style=\"color:#e6d9b6;text-decoration:none;border-bottom:1px solid rgba(198,162,78,.5)\">concierge@medycanna.com<\u002Fa><\u002Fdiv>\n          <button onclick=\"{{ cavaLoginView }}\" style=\"background:none;border:none;cursor:pointer;color:#9a9280;font-size:12px;margin-top:2px\">← Ya tengo acceso · Ingresar<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- CONFIRMACION -->\n      <sc-if value=\"{{ cavaConfirm }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"min-height:100vh;display:flex;align-items:center;justify-content:center;padding:clamp(24px,5vw,60px)\">\n        <div style=\"width:100%;max-width:480px;border:1px solid rgba(198,162,78,.35);padding:clamp(32px,4vw,52px);display:flex;flex-direction:column;gap:18px;text-align:center;background:rgba(255,255,255,.015)\">\n          <div style=\"width:64px;height:64px;border-radius:50%;border:1px solid #c6a24e;display:flex;align-items:center;justify-content:center;margin:0 auto;color:#c6a24e;font-size:30px\">✓<\u002Fdiv>\n          <div style=\"font-size:12px;letter-spacing:.42em;color:#c6a24e;padding-left:.42em\">CAVA<\u002Fdiv>\n          <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:500;font-size:34px;color:#efe9dc;margin:0\">Solicitud enviada<\u002Fh2>\n          <p style=\"font-weight:300;color:#c9c8b6;line-height:1.7;margin:0\">Gracias por tu interés en la Cava med&amp;canna. Tu concierge revisará tu solicitud y te responderá desde concierge@medycanna.com con una invitación personal para activar tu acceso.<\u002Fp>\n          <button onclick=\"{{ cavaActivateView }}\" style=\"background:linear-gradient(90deg,#c6a24e,#e2c680);color:#20180a;border:none;padding:15px;cursor:pointer;font-size:12px;letter-spacing:.18em;text-transform:uppercase;margin-top:6px\">Ya recibí mi invitación<\u002Fbutton>\n          <button onclick=\"{{ goHome }}\" style=\"background:none;border:none;cursor:pointer;color:#9a9280;font-size:13px\">Volver a la tienda<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ACTIVAR ACCESO -->\n      <sc-if value=\"{{ cavaActivate }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"min-height:100vh;display:flex;flex-wrap:wrap\">\n        <div style=\"flex:1 1 340px;min-height:320px;background:repeating-linear-gradient(135deg,#12160d 0 16px,#191e12 16px 32px);color:#6d7a52;font-family:ui-monospace,Menlo,monospace;font-size:11px;display:flex;align-items:flex-end;padding:20px\">[ cava · detalle ]<\u002Fdiv>\n        <div style=\"flex:1 1 360px;display:flex;align-items:center;justify-content:center;padding:clamp(28px,5vw,60px)\">\n          <div style=\"width:100%;max-width:430px;border:1px solid rgba(198,162,78,.35);padding:clamp(28px,4vw,44px);display:flex;flex- \"{{ leadForm }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:flex;flex-direction:column;gap:14px\">\n          <div style=\"font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#8a7a4e\">{{ leadEyebrow }}<\u002Fdiv>\n          <h3 style=\"font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(26px,4vw,34px);line-height:1.1;color:#2a2924;margin:0\">{{ leadHeadline }}<\u002Fh3>\n          <p style=\"font-weight:300;color:#6c6a60;margin:0;line-height:1.6\">{{ leadBody }}<\u002Fp>\n          <input placeholder=\"Tu correo electrónico\" style=\"border:1px solid rgba(0,0,0,.2);background:#fff;padding:14px;font-size:14px;color:#33322b\">\n          <button onclick=\"{{ submitLead }}\" style=\"background:#37432f;color:#efece4;border:none;padding:14px;cursor:pointer;font-size:12px;letter-spacing:.16em;text-transform:uppercase\">{{ leadButton }}<\u002Fbutton>\n          <button onclick=\"{{ closeLead }}\" style=\"background:none;border:none;cursor:pointer;font-size:12px;color:#9a9384;text-decoration:underline\">No, gracias<\u002Fbutton>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:860},&quot;announce1&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Envío de cortesía en todas tus compras&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Barra de anuncios&quot;},&quot;announce2&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Nuevas ediciones limitadas disponibles en la Cava&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Barra de anuncios&quot;},&quot;leadEyebrow&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;eBook gratuito&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Captación de leads&quot;},&quot;leadHeadline&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;La guía completa del estilo de vida de Med&amp;Canna&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Captación de leads&quot;},&quot;leadBody&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Deja tu correo para descargar el eBook con la guía completa del estilo de vida de nuestra tribu&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Captación de leads&quot;},&quot;leadButton&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Descargar eBook&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Captación de leads&quot;},&quot;leadPillLabel&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;eBook gratis&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Captación de leads&quot;},&quot;leadThanksBody&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Tu eBook va en camino a tu correo. Revisa tu bandeja de entrada para descargar la guía completa del estilo de vida de Med&amp;Canna&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Captación de leads&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    route: 'home',\n    cavaSub: 'login',\n    cavaUnlocked: false,\n    product: null,\n    pdpMg: 0,\n    pdpQty: 1,\n    cart: [],\n    cartOpen: false,\n    orderDone: false,\n    leadPill: false,\n    mobile: false,\n    navOpen: false,\n    colOpen: false,\n    sitemapOpen: false,\n    leadOpen: false,\n    leadThanks: false,\n    nlThanks: false,\n    faqOpen: -1,\n    annIdx: 0,\n    doseGoal: 'Descanso',\n    doseLevel: 2,\n  };\n\n  componentDidMount() {\n    this._rz = () => {\n      const m = window.innerWidth < 920;\n      if (m !== this.state.mobile) this.setState({ mobile: m });\n    };\n    this._rz();\n    window.addEventListener('resize', this._rz);\n    // Lead magnet: aparece tras navegar 3 páginas diferentes\n    this._seen = new Set([this.state.route]);\n    this._lastRoute = this.state.route;\n    this._leadTriggered = false;\n  }\n  componentDidUpdate() {\n    if (this.state.route !== this._lastRoute) {\n      this._lastRoute = this.state.route;\n      if (!this._seen) this._seen = new Set();\n      this._seen.add(this.state.route);\n      if (this._seen.size >= 3 && !this._leadTriggered && !this.state.leadOpen) {\n        let seen = false;\n        try { seen = sessionStorage.getItem('mc_lead_seen') === '1'; } catch (e) {}\n        if (!seen) {\n          this._leadTriggered = true;\n          this.setState({ leadOpen: true, leadThanks: false });\n        }\n      }\n    }\n  }\n  componentWillUnmount() {\n    window.removeEventListener('resize', this._rz);\n  }\n\n  updQty(i, d) { const cart = this.state.cart.map((c, idx) => idx === i ? { ...c, qty: Math.max(1, c.qty + d) } : c); this.setState({ cart }); }\n  removeItem(i) { const cart = this.state.cart.filter((_, idx) => idx !== i); this.setState({ cart }); }\n\n  top() { try { window.scrollTo(0, 0); } catch (e) {} }\n  go = (route) => { this.setState({ route, navOpen: false, colOpen: false, sitemapOpen: false, cartOpen: false }); this.top(); };\n\n  renderVals() {\n    const s = this.state;\n    const r = s.route;\n    const goers = {};\n    ['home','colecciones','humanos','animalia','filosofia','calidad','protocolos','journal','article','faq','contacto','envios','terminos','privacidad','cookies','facturacion'].forEach(k => {\n      const cap = k.charAt(0).toUpperCase() + k.slice(1);\n      goers['go' + cap] = () => this.go(k);\n    });\n    goers.goFAQ = goers.goFaq;\n\n    // Cava\n    const goCava = () => { this.setState({ route: 'cava', navOpen: false, sitemapOpen: false, cavaSub: s.cavaUnlocked ? 'inside' : 'login' }); this.top(); };\n    const cavaView = (sub) => { this.setState({ route: 'cava', cavaSub: sub }); this.top(); };\n    const cavaEnter = () => { this.setState({ route: 'cava', cavaUnlocked: true, cavaSub: 'inside' }); this.top(); };\n    const cavaExit = () => { this.setState({ cavaUnlocked: false, cavaSub: 'login', route: 'home' }); this.top(); };\n\n    // FAQ\n    const faqGroupData = [\n      { cat: 'Fundamentos', items: [\n        { q: '\\u00bfQu\\u00e9 es el CBD?', a: 'El cannabidiol (CBD) es un compuesto derivado del c\\u00e1\\u00f1amo que interact\\u00faa con el sistema endocannabinoide, una red biol\\u00f3gica relacionada con procesos de equilibrio, recuperaci\\u00f3n y bienestar general.' },\n        { q: '\\u00bfEl CBD pone \\u201chigh\\u201d?', a: 'El CBD no es psicoactivo y no produce efectos de intoxicaci\\u00f3n o \\u201chigh\\u201d. A diferencia del THC, el CBD interact\\u00faa con el cuerpo sin alterar la percepci\\u00f3n o la conciencia.' },\n        { q: '\\u00bfC\\u00f3mo funciona en el cuerpo?', a: 'Interact\\u00faa con el sistema endocannabinoide, el cual participa en funciones relacionadas con descanso, enfoque, recuperaci\\u00f3n y respuesta al estr\\u00e9s.' },\n        { q: '\\u00bfEs seguro usarlo todos los d\\u00edas?', a: 'Puede integrarse como parte de una rutina diaria de bienestar. Si se encuentra bajo tratamiento m\\u00e9dico, recomendamos consultar previamente con un profesional de la salud.' },\n        { q: '\\u00bfM\\u00e1s CBD significa mejores resultados?', a: 'No. El cuerpo responde a equilibrio, no a saturaci\\u00f3n. La precisi\\u00f3n supera a la cantidad.' },\n        { q: '\\u00bfEn cu\\u00e1nto tiempo siento los efectos?', a: 'Depende del metabolismo, la dosis y la v\\u00eda de administraci\\u00f3n. Sublingual: 15\\u201340 minutos. Ingesti\\u00f3n: 40\\u201390 minutos.' },\n        { q: '\\u00bfQu\\u00e9 dosis debo usar?', a: 'La dosis puede variar seg\\u00fan el objetivo, la sensibilidad individual y la rutina personal. Recomendamos iniciar de forma gradual y ajustar progresivamente.' },\n        { q: '\\u00bfPuedo combinar diferentes f\\u00f3rmulas?', a: 'S\\u00ed. Las formulaciones pueden integrarse dentro de una misma rutina de manera responsable y progresiva.' },\n        { q: '\\u00bfPuedo usarlo si tomo medicamentos?', a: 'Si se encuentra bajo tratamiento m\\u00e9dico, consulte previamente con un profesional de la salud antes de incorporar cualquier suplemento.' },\n        { q: '\\u00bfPuedo usarlo para insomnio, dolor o ansiedad?', a: 'Nuestros productos no est\\u00e1n destinados a diagnosticar o curar enfermedades. Est\\u00e1n dise\\u00f1ados para apoyar el bienestar general.' },\n      ] },\n      { cat: 'Legalidad y regulaci\\u00f3n', items: [\n        { q: '\\u00bfEs legal el CBD en M\\u00e9xico?', a: 'S\\u00ed. med&canna opera bajo el marco regulatorio vigente y el cumplimiento sanitario aplicable en M\\u00e9xico.' },\n        { q: '\\u00bfLos productos contienen THC?', a: 'Nuestras formulaciones cumplen con la regulaci\\u00f3n mexicana vigente, manteniendo niveles permitidos dentro de los l\\u00edmites legales.' },\n        { q: '\\u00bfEst\\u00e1 aprobado por COFEPRIS?', a: 'Este tipo de productos no se aprueba individualmente. med&canna opera bajo regulaci\\u00f3n vigente y cumplimiento sanitario aplicable.' },\n        { q: '\\u00bfPuede afectar pruebas antidoping?', a: 'Las formulaciones cumplen con los l\\u00edmites regulatorios permitidos. Si est\\u00e1 sujeto a controles estrictos, recomendamos validar previamente con su instituci\\u00f3n correspondiente.' },\n        { q: '\\u00bfPuedo llevar med&canna en mi equipaje?', a: 'Recomendamos revisar la regulaci\\u00f3n local del destino antes de viajar con cualquier producto derivado del c\\u00e1\\u00f1amo.' },\n      ] },\n      { cat: 'Calidad y formulaci\\u00f3n', items: [\n        { q: '\\u00bfQu\\u00e9 diferencia a med&canna del resto?', a: 'Precisi\\u00f3n en formulaci\\u00f3n, cumplimiento regulatorio y una visi\\u00f3n de largo plazo. med&canna fue dise\\u00f1ado para elevar el est\\u00e1ndar del bienestar en M\\u00e9xico.' },\n        { q: '\\u00bfPor qu\\u00e9  recuperaci\\u00f3n y el bienestar general.' },\n      ] },\n      { cat: 'Env\\u00edos y pol\\u00edticas', items: [\n        { q: '\\u00bfLo recibo en cualquier parte de M\\u00e9xico?', a: 'S\\u00ed. Realizamos env\\u00edos a todo M\\u00e9xico.' },\n        { q: '\\u00bfCu\\u00e1nto tarda el env\\u00edo?', a: 'El tiempo estimado de entrega es de 2 a 5 d\\u00edas h\\u00e1biles, dependiendo de la ciudad de destino.' },\n        { q: '\\u00bfCu\\u00e1l es la pol\\u00edtica de devoluci\\u00f3n?', a: 'Por razones sanitarias, no aceptamos devoluciones en productos abiertos.' },\n        { q: '\\u00bfC\\u00f3mo puedo contactar a med&canna?', a: 'Puede comunicarse con nuestro equipo a trav\\u00e9s de los canales oficiales disponibles.' },\n      ] },\n    ];\n    let faqIdx = 0;\n    const faqGroups = faqGroupData.map(g => ({\n      cat: g.cat,\n      items: g.items.map(f => {\n        const i = faqIdx++;\n        return { q: f.q, a: f.a, open: s.faqOpen === i, sign: s.faqOpen === i ? '\\u2212' : '+', toggle: () => this.setState({ faqOpen: s.faqOpen === i ? -1 : i }) };\n      })\n    }));\n    const faqItems = faqGroups[0].items.slice(0, 5);\n\n    const journal = [\n      { cat: 'BIENESTAR', title: 'Rutinas para un bienestar integral', excerpt: 'Peque\\u00f1os h\\u00e1bitos diarios que sostienen una vida de mayor claridad y equilibrio.', read: '5 min' },\n      { cat: 'CIENCIA', title: 'Entendiendo los fitocannabinoides', excerpt: 'Qu\\u00e9 son, c\\u00f3mo act\\u00faan y por qu\\u00e9 la evidencia importa al elegir una f\\u00f3rmula.', read: '7 min' },\n      { cat: 'ESTILO DE VIDA', title: 'Peque\\u00f1os rituales, grandes cambios', excerpt: 'C\\u00f3mo convertir el autocuidado en una pr\\u00e1ctica constante y sostenible.', read: '4 min' },\n      { cat: 'BIENESTAR', title: 'El descanso como inversi\\u00f3n', excerpt: 'Por qu\\u00e9 dormir mejor es la base del rendimiento y la recuperaci\\u00f3n.', read: '6 min' },\n    ];\n\n    const priceMap = { 'AURA': 890, 'NOCTU
